<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITalk | Login Dev</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="aitalk-theme">
    <div class="glow"></div>
    <!-- NAVBAR REUTILIZABLE -->
    <nav class="navbar">
        <a href="index.html" class="logo">AITalk</a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="planes.html">Planes</a>
            <a href="about.html">Sobre Nosotros</a>
            <a href="docs.html">Developers Docs</a>
            <a href="login-dev.html" class="active" style="color: #a855f7; font-weight: bold;">🧑‍💻 Vista Dev</a>
        </div>
    </nav>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 20px;">Acceso Desarrollador</h2>
            <p style="text-align: center; color: var(--ai-muted); margin-bottom: 2rem;">Ingresa tus credenciales maestras.</p>
            
            <input type="text" id="dev-user" placeholder="Usuario" class="login-input">
            <input type="password" id="dev-pass" placeholder="Contraseña" class="login-input">
            
            <button onclick="checkDevLogin()" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Entrar al Sistema</button>
            <p id="login-error" style="color: #ff5555; text-align: center; margin-top: 15px; display: none;">Credenciales incorrectas.</p>
        </div>
    </main>
    <footer class="site-footer">Proyecto AITalk &copy; 2026.</footer>
    <script src="scripts.js"></script>
</body>
</html>

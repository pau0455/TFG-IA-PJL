<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NovaBurger</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="nova-theme">
    <div class="back-bar" style="background: #222;">
        <a href="index.html" style="color: var(--nova-accent);">← Volver a AITalk</a>
        <span>Delivery 24/7 Disponible</span>
    </div>
    <header style="padding: 1.5rem 5%; text-align: center; border-bottom: 2px solid #222;">
        <div class="nova-logo">NovaBurger</div>
    </header>
    <main class="nova-hero" style="padding-bottom: 12rem;">
        <h1 style="font-family: 'Outfit', sans-serif; font-size: 5rem; text-transform: uppercase;">Smash <span>the</span> Rules</h1>
        <p style="color: #ccc; font-size: 1.2rem;">Las smash burgers más bestias de la ciudad.</p>
    </main>
    
    <div class="ai-widget" style="border-color: var(--nova-primary);">
        <div class="ai-widget-header"><span>⚡ Powered by AITalk</span></div>
        <h4 style="margin-bottom: 10px;">¿Hambriento?</h4>
        <p style="font-size: 0.85rem; color: #ccc;">Reserva una mesa para tu grupo al instante.</p>
        <button class="ai-widget-btn" style="background: var(--nova-primary); color: white;">💬 Pedir por Chat</button>
    </div>
</body>
</html>
